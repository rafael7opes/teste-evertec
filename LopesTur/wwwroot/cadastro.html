<!DOCTYPE html>
<html>
<head>
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
</head>
<body>

<!-- Cabeçalho com navegação entre as páginas -->
<header>
  <h2>Guia de Turismo</h2>
  <nav>
    <a href="index.html">Lista de Pontos</a> | 
    <a href="cadastro.html">Novo Cadastro</a>
  </nav>
  <hr>
</header>

<h1>Cadastrar Ponto Turístico</h1>

<!-- Campos para cadastrar um novo ponto turístico -->
<input type="text" id="nome" placeholder="Nome"><br><br>
<input type="text" id="descricao" placeholder="Descrição" maxlength="100"><br><br>
<input type="text" id="localizacao" placeholder="Localização"><br><br>
<input type="text" id="cidade" placeholder="Cidade"><br><br>

<!-- Seleção do estado -->
<select id="estado">
  <option value="">Selecione</option>
  <option>SP</option>
  <option>PR</option>
  <option>RJ</option>
</select>

<br><br>

<!-- Botão que chama a função salvar() no JavaScript -->
<button onclick="salvar()">Salvar</button>

<br><br>

<!-- Arquivo JS com as funções do sistema -->
<script src="script.js"></script>
</body>
</html>
